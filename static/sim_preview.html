<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sim Preview v5</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .page-title {
    color: #777;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .sim-canvas {
    background: #f0f0ea;
    border-radius: 20px;
    padding: 52px 72px 44px;
    display: flex;
    align-items: flex-end;
    gap: 72px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.6);
  }
  .component-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .comp-label { font-size: 11px; font-weight: 700; color: #555; text-align: center; line-height: 1.6; }
  .comp-pin   { font-size: 10px; font-weight: 400; color: #999; }
  svg { overflow: visible; display: block; }
  .status-bar {
    margin-top: 28px;
    padding: 10px 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #7ab;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    min-width: 380px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="page-title">Simulation Components — v5</div>

<div class="sim-canvas">

  <!-- ══ RED LED ══════════════════════════════════════════════════════════ -->
  <div class="component-col" onclick="toggleLed('red')">
    <svg width="80" height="110" viewBox="-40 -10 80 110" style="overflow:visible">
      <!-- Glow halos — plain circles, no filters -->
      <circle id="gr4" cx="0" cy="21" r="44" fill="#ff0000" opacity="0"/>
      <circle id="gr3" cx="0" cy="21" r="34" fill="#ff0000" opacity="0"/>
      <circle id="gr2" cx="0" cy="21" r="26" fill="#ff2222" opacity="0"/>
      <circle id="gr1" cx="0" cy="21" r="20" fill="#ff4444" opacity="0"/>
      <!-- Leads -->
      <line x1="-7" y1="47" x2="-7" y2="80" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <line x1="7"  y1="47" x2="7"  y2="88" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <!-- Dome: arc sweep upward -->
      <path id="dome-red" d="M -16,21 A 16,16 0 0,1 16,21 Z" fill="#7a1010"/>
      <!-- Body -->
      <rect id="body-red" x="-16" y="21" width="32" height="20" fill="#7a1010"/>
      <!-- Collar -->
      <rect id="coll-red" x="-16" y="38" width="32" height="8" rx="2" fill="#4d0a0a"/>
      <!-- Shine -->
      <path d="M -6,10 A 16,16 0 0,1 6,10 L 4,21 L -4,21 Z" fill="white" opacity="0.2" pointer-events="none"/>
      <rect x="-5" y="21" width="7" height="10" fill="white" opacity="0.1" pointer-events="none"/>
    </svg>
    <div class="comp-label">Red LED<br><span class="comp-pin">Pin 8</span></div>
  </div>

  <!-- ══ YELLOW LED ════════════════════════════════════════════════════════ -->
  <div class="component-col" onclick="toggleLed('yellow')">
    <svg width="80" height="110" viewBox="-40 -10 80 110" style="overflow:visible">
      <circle id="gy4" cx="0" cy="21" r="44" fill="#ffcc00" opacity="0"/>
      <circle id="gy3" cx="0" cy="21" r="34" fill="#ffcc00" opacity="0"/>
      <circle id="gy2" cx="0" cy="21" r="26" fill="#ffdd00" opacity="0"/>
      <circle id="gy1" cx="0" cy="21" r="20" fill="#ffee44" opacity="0"/>
      <line x1="-7" y1="47" x2="-7" y2="80" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <line x1="7"  y1="47" x2="7"  y2="88" stroke="#999" stroke-width="2" stroke-linecap="round"/>
      <path id="dome-yellow" d="M -16,21 A 16,16 0 0,1 16,21 Z" fill="#6e5500"/>
      <rect id="body-yellow" x="-16" y="21" width="32" height="20" fill="#6e5500"/>
      <rect id="coll-yellow" x="-16" y="38" width="32" height="8" rx="2" fill="#453400"/>
      <path d="M -6,10 A 16,16 0 0,1 6,10 L 4,21 L -4,21 Z" fill="white" opacity="0.2" pointer-events="none"/>
      <rect x="-5" y="21" width="7" height="10" fill="white" opacity="0.1" pointer-events="none"/>
    </svg>
    <div class="comp-label">Yellow LED<br><span class="comp-pin">Pin 9</span></div>
  </div>

  <!-- ══ BUTTON ════════════════════════════════════════════════════════════ -->
  <div class="component-col" id="btn-col">
    <svg width="80" height="80" viewBox="-40 -40 80 80" style="overflow:visible">
      <!-- PCB -->
      <rect x="-30" y="-30" width="60" height="60" rx="5" fill="#267326" stroke="#1a5c1a" stroke-width="1.5"/>
      <!-- Traces -->
      <line x1="-30" y1="-12" x2="-16" y2="-12" stroke="#48c248" stroke-width="1.2" opacity="0.55"/>
      <line x1="16"  y1="-12" x2="30"  y2="-12" stroke="#48c248" stroke-width="1.2" opacity="0.55"/>
      <line x1="-30" y1="12"  x2="-16" y2="12"  stroke="#48c248" stroke-width="1.2" opacity="0.55"/>
      <line x1="16"  y1="12"  x2="30"  y2="12"  stroke="#48c248" stroke-width="1.2" opacity="0.55"/>
      <!-- Pads -->
      <rect x="-35" y="-18" width="8" height="6" rx="1.5" fill="#c9a000"/>
      <rect x="27"  y="-18" width="8" height="6" rx="1.5" fill="#c9a000"/>
      <rect x="-35" y="12"  width="8" height="6" rx="1.5" fill="#c9a000"/>
      <rect x="27"  y="12"  width="8" height="6" rx="1.5" fill="#c9a000"/>
      <!-- Rim -->
      <circle cx="0" cy="0" r="19" fill="#5a5a5a"/>
      <!-- Inner shadow ring -->
      <circle cx="0" cy="1.5" r="16" fill="#333"/>
      <!-- Cap -->
      <circle id="btn-cap" cx="0" cy="-1.5" r="14.5" fill="#d2cac0"/>
      <!-- Shine: plain ellipse -->
      <ellipse id="btn-shine" cx="-3" cy="-6" rx="5" ry="3" fill="white" opacity="0.28" pointer-events="none"/>
    </svg>
    <div class="comp-label">Button<br><span class="comp-pin">Pin 2</span></div>
  </div>

</div>

<div class="status-bar" id="status">click an LED to toggle &nbsp;·&nbsp; hold the button to press</div>

<script>
var ledState = { red: false, yellow: false };

var LED_CFG = {
  red: {
    off:    { main: '#7a1010', collar: '#4d0a0a' },
    on:     { main: '#ff1a1a', collar: '#cc0000' },
    glows:  ['gr4','gr3','gr2','gr1'],
    opacs:  [0.10, 0.16, 0.25, 0.40],
    pin: 8
  },
  yellow: {
    off:    { main: '#6e5500', collar: '#453400' },
    on:     { main: '#ffe000', collar: '#ccaa00' },
    glows:  ['gy4','gy3','gy2','gy1'],
    opacs:  [0.10, 0.16, 0.25, 0.40],
    pin: 9
  }
};

function toggleLed(color) {
  ledState[color] = !ledState[color];
  var on  = ledState[color];
  var cfg = LED_CFG[color];
  var c   = on ? cfg.on : cfg.off;

  document.getElementById('dome-' + color).setAttribute('fill', c.main);
  document.getElementById('body-' + color).setAttribute('fill', c.main);
  document.getElementById('coll-' + color).setAttribute('fill', c.collar);

  for (var i = 0; i < cfg.glows.length; i++) {
    document.getElementById(cfg.glows[i]).setAttribute('opacity', on ? cfg.opacs[i] : 0);
  }

  setStatus((color.charAt(0).toUpperCase() + color.slice(1)) +
            ' LED ' + (on ? 'ON  ●' : 'OFF ○') +
            '  ·  Pin ' + cfg.pin + ' → ' + (on ? 'HIGH (5V)' : 'LOW (0V)'));
}

// Button
var btnCap   = document.getElementById('btn-cap');
var btnShine = document.getElementById('btn-shine');

function pressBtn() {
  btnCap.setAttribute('cy', '1.5');
  btnCap.setAttribute('fill', '#a8a09a');
  btnShine.setAttribute('opacity', '0.1');
  setStatus('Button PRESSED  ·  Pin 2 → LOW (0V)');
}
function releaseBtn() {
  btnCap.setAttribute('cy', '-1.5');
  btnCap.setAttribute('fill', '#d2cac0');
  btnShine.setAttribute('opacity', '0.28');
  setStatus('Button RELEASED  ·  Pin 2 → HIGH (5V)');
}

var btnCol = document.getElementById('btn-col');
btnCol.addEventListener('mousedown',  pressBtn);
btnCol.addEventListener('mouseup',    releaseBtn);
btnCol.addEventListener('mouseleave', releaseBtn);
btnCol.addEventListener('touchstart', function(e) { e.preventDefault(); pressBtn(); });
btnCol.addEventListener('touchend',   function(e) { e.preventDefault(); releaseBtn(); });

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
