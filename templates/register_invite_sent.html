<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email — KidsCode</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: #fff;
            border: 2px solid #dbeafe;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(9,105,218,0.08);
            text-align: center;
        }
        .email-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .auth-card h2 {
            font-size: 26px;
            font-weight: 800;
            color: #0969da;
            margin-bottom: 12px;
        }
        .auth-card p {
            color: #57606a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 0;
        }
        .spam-note {
            background: #fff8c5;
            border: 2px solid #d4a72c;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #6e4c00;
            margin-top: 24px;
            text-align: left;
        }
        .spam-note strong {
            display: block;
            margin-bottom: 2px;
        }
        .auth-link {
            font-size: 13px;
            color: #57606a;
            margin-top: 24px;
        }
        .auth-link a {
            color: #0969da;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <span class="email-icon">📬</span>
        <h2>Check Your Email</h2>
        <p>If that address checks out, we've sent a link to create your account. It's good for 60 minutes.</p>

        <div class="spam-note">
            <strong>Can't find it?</strong>
            Check your spam or junk folder — it may have landed there.
        </div>

        <div class="auth-link">
            <a href="{{ url_for('auth.login') }}">← Back to login</a>
        </div>
    </div>
</div>
</body>
</html>
