<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — KidsCode</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #fff;
            border: 2px solid #dbeafe;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(9,105,218,0.08);
        }
        .auth-card h2 {
            font-size: 24px;
            font-weight: 800;
            color: #0969da;
            margin-bottom: 24px;
        }
        .auth-card input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dbeafe;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-card input:focus {
            border-color: #0969da;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #0969da;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .auth-card button:hover { background: #0550ae; }
        .auth-card .auth-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #57606a;
        }
        .auth-card .auth-link a {
            color: #0969da;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom: 20px;">
            <img src="{{ url_for('static', filename='graphics/logo.png') }}" alt="KidsCode" style="height: 160px; width: auto;">
        </div>
        <h2>🧑‍💻 Login</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-msg error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="auth-link">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
        <div class="auth-link" style="margin-top: 8px;">
            <a href="{{ url_for('auth.forgot_password') }}">Forgot your password?</a>
        </div>
    </div>
</div>
</body>
</html>
